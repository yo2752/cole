log4j.appender.CORREO.layout.ConversionPattern=%d{dd/MM HH:mm:ss} [%-5p]%m%n
log4j.appender.CORREO.MaxFileSize=5000KB
log4j.appender.CORREO.MaxBackupIndex=5

