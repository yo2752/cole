### logger para correo oegam ###
log4j.rootCategory=ALL,ARCHIVO

### Para dirigir los mensajes a un archivo ###
log4j.appender.ARCHIVO=org.apache.log4j.FileAppender
log4j.appender.ARCHIVO.File=/var/datos/logs/loging.log
log4j.appender.ARCHIVO.layout=org.apache.log4j.PatternLayout
##log4j.appender.ARCHIVO.layout.ConversionPattern=%d{ABSOLUTE} %5p %c{1}:%L - %m%n
log4j.appender.ARCHIVO.layout.ConversionPattern=%d{dd/MM HH:mm:ss} [%-5p]%m%n
log4j.appender.ARCHIVO.MaxFileSize=5000KB
log4j.appender.ARCHIVO.MaxBackupIndex=5

log4j.logger.org.oegam.gestorcorreos.services.GestorCorreo=ALL,CORREO
log4j.appender.CORREO=org.apache.log4j.FileAppender
log4j.appender.CORREO.File=/var/datos/logs/correoOegam.log
